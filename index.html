
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VNPT Quảng Ninh Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              vnpt: {
                blue: '#0068FF',
                dark: '#004BB5',
                light: '#E6F0FF',
              }
            }
          }
        }
      }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-slate-800 font-sans antialiased">
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      const originalError = console.error;
      console.error = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('Support for defaultProps will be removed')) {
          return;
        }
        originalError.apply(console, args);
      };
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').innerText += message + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
